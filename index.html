<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사하의집 · 변비 관리 체크리스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --paper:#F3F5F8;
  --ink:#1E2A3A;
  --ink-soft:#5B6B7C;
  --sage:#3E5C76;
  --sage-light:#E4EAF0;
  --sage-line:#C3D0DC;
  --terracotta:#C85A3E;
  --terracotta-light:#F5E2DA;
  --gold:#8A96A3;
  --card:#FFFFFF;
  --line:#DCE2E8;
  --danger:#C0392B;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(30,42,58,0.07), 0 1px 2px rgba(30,42,58,0.05);
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
}
h1,h2,h3{font-family:'IBM Plex Sans KR', sans-serif; margin:0; font-weight:700;}
button{font-family:inherit; cursor:pointer;}
#app{max-width:640px; margin:0 auto; padding:20px 16px 80px;}

/* header */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0 10px; margin-bottom:14px;
  border-top:3px solid var(--sage);
  border-bottom:1px solid var(--sage);
  position:relative;
}
.topbar::after{
  content:"";
  position:absolute; left:0; right:0; bottom:-4px;
  height:1px; background:var(--line);
}
.brand{display:flex; align-items:center; gap:9px;}
.brand-mark{width:26px; height:26px; flex-shrink:0;}
.brand-name{font-size:13px; font-weight:700; color:var(--ink); letter-spacing:0.3px;}
.brand-eyebrow{font-size:9.5px; color:var(--ink-soft); letter-spacing:1.2px; display:block; margin-bottom:1px; font-family:'IBM Plex Mono', monospace;}
.back-btn{
  background:none; border:1px solid var(--line); color:var(--ink-soft); font-size:12.5px;
  display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:20px;
}
.back-btn:hover{color:var(--sage); border-color:var(--sage);}

/* home */
.hero{
  text-align:center; padding:0 0 10px;
}
.hero-photo-wrap{
  position:relative; width:100%; height:210px; border-radius:4px;
  overflow:hidden; box-shadow:var(--shadow); margin-top:6px; border:1px solid var(--line);
}
.hero-photo-wrap img{
  width:100%; height:100%; object-fit:cover; display:block;
  filter:brightness(1.3) saturate(0.92);
}
.hero-photo-scrim{
  position:absolute; inset:0;
  background:rgba(30,42,58,0.08);
}
.hero-photo-text{
  position:absolute; left:0; right:0; bottom:0; text-align:left;
  background:rgba(24,34,46,0.88);
  border-top:2px solid var(--terracotta);
  padding:13px 16px 14px;
}
.hero-photo-text h1{
  font-size:22px; letter-spacing:-0.2px; color:#FFFFFF !important;
}
.hero-photo-text p{
  color:#FFFFFF !important; font-size:12px; margin-top:4px; font-weight:400;
  opacity:0.85; font-family:'IBM Plex Mono', monospace; letter-spacing:0.2px;
}
.home-actions{display:flex; flex-direction:column; gap:12px; margin-top:32px;}
.big-btn{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:20px 22px; text-align:left; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:space-between;
  transition:transform .15s ease, border-color .15s ease;
}
.big-btn:hover{transform:translateY(-2px); border-color:var(--sage);}
.big-btn .t{font-size:17px; font-weight:700; color:var(--ink);}
.big-btn .s{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
.big-btn.primary{background:var(--sage); border-color:var(--sage);}
.big-btn.primary .t, .big-btn.primary .s{color:#fff;}
.big-btn.primary .s{color:#DCE6EE;}
.arrow{font-size:20px; color:var(--sage); flex-shrink:0; margin-left:10px;}
.big-btn.primary .arrow{color:#fff;}

/* resident list */
.section-title{
  font-size:11.5px; font-weight:600; color:var(--ink-soft); text-transform:uppercase;
  letter-spacing:1.2px; margin:24px 0 10px; font-family:'IBM Plex Mono', monospace;
  padding-left:10px; border-left:3px solid var(--sage);
}
.resident-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.resident-card{
  background:var(--card); border:1px solid var(--line); border-left:3px solid var(--sage-line);
  border-radius:var(--radius-sm); padding:16px 14px 16px 13px; box-shadow:var(--shadow);
  text-align:left; position:relative; transition:border-color .15s ease;
}
.resident-card:hover{border-color:var(--line); border-left-color:var(--sage);}
.resident-card .name{font-size:15.5px; font-weight:700;}
.resident-card .status{
  margin-top:8px; font-size:11.5px; display:inline-flex; align-items:center; gap:5px;
  padding:3px 8px; border-radius:3px; font-family:'IBM Plex Mono', monospace;
}
.status.done{background:var(--sage-light); color:var(--sage);}
.status.pending{background:var(--terracotta-light); color:var(--terracotta);}
.dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

/* checklist form */
.form-header{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm);
  padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow);
}
.form-header .resident-name{font-size:19px; font-weight:700;}
.date-row{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap;}
.date-row label{font-size:12.5px; color:var(--ink-soft);}
.date-row input[type=date]{
  border:1px solid var(--line); border-radius:6px; padding:7px 10px; font-size:13.5px;
  font-family:'IBM Plex Mono', monospace; color:var(--ink); background:var(--paper);
}
.progress-note{font-size:11.5px; color:var(--ink-soft); margin-top:10px; font-family:'IBM Plex Mono', monospace;}
.progress-bar-track{height:5px; background:var(--sage-light); border-radius:4px; margin-top:6px; overflow:hidden;}
.progress-bar-fill{height:100%; background:var(--sage); transition:width .2s ease;}

.field-section{margin-bottom:18px;}
.field-section-title{
  display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700;
  color:var(--ink); margin-bottom:9px; padding-bottom:7px; border-bottom:1px solid var(--sage-line);
}
.fs-num{
  font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:700; color:#fff;
  background:var(--sage); border-radius:4px; padding:2px 6px; flex-shrink:0;
}
.field-block{
  background:var(--card); border:1px solid var(--line); border-radius:6px;
  padding:14px 16px; margin-bottom:8px;
}
.field-label{font-size:13px; font-weight:600; margin-bottom:9px; display:flex; align-items:center; gap:6px;}
.field-label .req{color:var(--terracotta); font-size:11px; font-weight:700; border:1px solid var(--terracotta); border-radius:3px; padding:1px 5px;}
.field-caption{font-size:11px; color:var(--ink-soft); margin:-5px 0 9px; line-height:1.5;}
.pill-group{display:flex; flex-wrap:wrap; gap:6px;}
.pill{
  border:1px solid var(--line); background:var(--paper); color:var(--ink);
  border-radius:5px; padding:7px 13px; font-size:13px; transition:all .12s ease;
}
.pill:hover{border-color:var(--sage);}
.pill.selected{background:var(--sage); border-color:var(--sage); color:#fff; font-weight:600;}
.pill.warn.selected{background:var(--terracotta); border-color:var(--terracotta);}
.pill.bristol{min-width:38px; text-align:center; font-family:'IBM Plex Mono', monospace;}
.other-input{
  margin-top:9px; width:100%; border:1px solid var(--line); border-radius:5px;
  padding:8px 10px; font-size:13px; font-family:inherit; display:none;
}
.other-input.show{display:block;}
textarea.note-input{
  width:100%; border:1px solid var(--line); border-radius:6px; padding:10px;
  font-family:inherit; font-size:13px; resize:vertical; min-height:60px;
}
.save-bar{
  position:sticky; bottom:0; background:linear-gradient(to top, var(--paper) 60%, transparent);
  padding:14px 0 4px; margin-top:8px;
}
.save-btn{
  width:100%; background:var(--sage); color:#fff; border:none; border-radius:var(--radius-sm);
  padding:15px; font-size:15.5px; font-weight:700; box-shadow:var(--shadow);
}
.save-btn:hover{background:#2C4356;}

/* admin */
.stat-card{
  background:var(--sage); color:#fff; border-radius:6px; padding:20px 22px;
  display:flex; align-items:center; gap:20px; box-shadow:var(--shadow); margin-bottom:20px;
  border-left:4px solid var(--terracotta);
}
.ring{width:74px; height:74px; flex-shrink:0;}
.stat-text .n{font-size:26px; font-weight:700; font-family:'IBM Plex Mono', monospace;}
.stat-text .l{font-size:12px; color:#DCE6EE; margin-top:2px;}
.pending-chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
.chip{background:rgba(255,255,255,0.16); padding:4px 10px; border-radius:3px; font-size:11px; font-family:'IBM Plex Mono', monospace;}

.admin-row{
  background:var(--card); border:1px solid var(--line); border-radius:6px;
  padding:14px 16px; margin-bottom:9px;
}

/* stats */
.range-btn-group{display:flex; gap:8px; margin-bottom:14px;}
.range-btn{
  flex:1; background:var(--card); border:1px solid var(--line); border-radius:5px;
  padding:8px 6px; font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace;
}
.range-btn.active{background:var(--sage); border-color:var(--sage); color:#fff; font-weight:700;}
.section-hint{font-size:12px; color:var(--ink-soft); margin:-6px 0 12px;}
.stat-period-note{font-size:11px; color:var(--ink-soft); margin-bottom:10px; font-family:'IBM Plex Mono', monospace;}
.detail-tab-title{font-size:13px; font-weight:700; color:var(--sage); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; gap:8px;}
.print-btn{
  background:none; border:1px solid var(--sage); color:var(--sage); border-radius:4px;
  padding:5px 11px; font-size:11px; flex-shrink:0; white-space:nowrap;
}
.print-btn:hover{background:var(--sage-light);}
.print-header{display:none;}
.mini-chart-block{margin-bottom:16px;}
.mini-chart-title{font-size:12px; font-weight:600; color:var(--ink); margin-bottom:3px;}
.line-chart-svg{width:100%; height:70px; display:block; background:var(--paper); border-radius:4px; border:1px solid var(--line);}

.insight-box{
  background:var(--paper); border:1px solid var(--line); border-left:3px solid var(--sage);
  border-radius:4px; padding:12px 14px 10px; margin-bottom:6px;
}
.insight-row{display:flex; align-items:flex-start; gap:7px; margin-bottom:8px; font-size:12.5px; line-height:1.5;}
.insight-icon{flex-shrink:0; font-size:10px; margin-top:3px;}
.insight-text{color:var(--ink);}
.insight-row.insight-warn .insight-text{color:var(--ink);}
.insight-disclaimer{font-size:10.5px; color:var(--ink-soft); margin-top:6px; padding-top:8px; border-top:1px dashed var(--line); line-height:1.5;}

.date-select-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.date-select-row label{font-size:12px; color:var(--ink-soft);}
.date-select{
  border:1px solid var(--line); border-radius:5px; padding:6px 9px; font-size:13px;
  font-family:'IBM Plex Mono', monospace; background:var(--paper); color:var(--ink);
}
.admin-row-top{display:flex; align-items:center; justify-content:space-between; cursor:pointer;}
.admin-row-top .name{font-weight:700; font-size:14.5px;}
.admin-row-top .date{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace;}
.admin-summary{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
.mini-chip{font-size:11px; padding:3px 8px; border-radius:3px; background:var(--sage-light); color:var(--sage); font-family:'IBM Plex Mono', monospace;}
.mini-chip.alert{background:var(--terracotta-light); color:var(--terracotta);}
.detail-panel{display:none; margin-top:12px; border-top:1px dashed var(--line); padding-top:10px;}
.detail-panel.show{display:block;}
.detail-item{display:flex; justify-content:space-between; font-size:12.5px; padding:5px 0; border-bottom:1px solid #EEF1F4;}
.detail-item .k{color:var(--ink-soft);}
.detail-item .v{font-weight:600;}
.no-record{font-size:12.5px; color:var(--ink-soft); font-style:italic;}
.refresh-btn{
  background:none; border:1px solid var(--sage); color:var(--sage); border-radius:4px;
  padding:6px 14px; font-size:12px; margin-bottom:14px; font-family:'IBM Plex Mono', monospace;
}

/* toast */
#toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:6px; font-size:13.5px;
  opacity:0; transition:all .25s ease; pointer-events:none; z-index:50;
  max-width:88vw; text-align:center; line-height:1.5;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.loading{text-align:center; color:var(--ink-soft); font-size:13px; padding:30px 0;}

/* admin password gate */
.gate-wrap{
  display:flex; flex-direction:column; align-items:center; text-align:center;
  padding:50px 10px 10px;
}
.gate-icon{width:46px; height:46px; margin-bottom:16px; color:var(--sage);}
.gate-wrap h2{font-size:19px; margin-bottom:6px;}
.gate-wrap p{font-size:13px; color:var(--ink-soft); margin-bottom:24px;}
.pw-input{
  width:180px; text-align:center; font-size:24px; letter-spacing:8px;
  border:1px solid var(--line); border-radius:6px; padding:14px 10px;
  font-family:'IBM Plex Mono', monospace; background:var(--card); color:var(--ink);
}
.pw-input:focus{outline:none; border-color:var(--sage);}
.gate-btn{
  margin-top:18px; background:var(--sage); color:#fff; border:none; border-radius:6px;
  padding:13px 32px; font-size:14.5px; font-weight:700; box-shadow:var(--shadow);
}
.gate-btn:hover{background:#2C4356;}
.gate-error{color:var(--terracotta); font-size:12.5px; margin-top:12px; min-height:16px;}

@media(max-width:380px){
  .resident-grid{grid-template-columns:1fr;}
}

/* ---------- print ---------- */
@media print{
  body{background:#fff;}
  #app{max-width:100%; padding:0;}
  #toast{display:none !important;}
  .topbar, .save-bar, .print-btn{display:none !important;}

  .print-header{
    display:block !important;
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size:17px; font-weight:700; color:#000;
    margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #000;
  }

  /* 체크리스트 인쇄: 선택 안 된 pill 숨기고, 선택된 값은 밑줄 텍스트로 */
  body.printing-checklist .date-row, body.printing-checklist .progress-note, body.printing-checklist .progress-bar-track{display:none;}
  body.printing-checklist .form-header{box-shadow:none; border:none; padding:0 0 6px;}
  body.printing-checklist .resident-name{font-size:15px;}
  body.printing-checklist .field-block{
    box-shadow:none; border:1px solid #ccc; border-radius:4px; padding:8px 10px;
    break-inside:avoid; margin-bottom:6px;
  }
  body.printing-checklist .field-label{font-size:12px;}
  body.printing-checklist .field-caption{display:none;}
  body.printing-checklist .pill{display:none;}
  body.printing-checklist .pill.selected{
    display:inline-block !important; background:none !important; color:#000 !important;
    border:none !important; padding:0; font-weight:700; text-decoration:underline;
  }
  body.printing-checklist .other-input{border:none; padding:0; background:none;}
  body.printing-checklist .note-input{border:1px solid #ccc; background:none;}

  /* 관리자 인쇄: 클릭한 이용인 카드만 보이게 */
  body.printing-admin .stat-card, body.printing-admin .refresh-btn,
  body.printing-admin .range-btn-group, body.printing-admin .section-hint,
  body.printing-admin .section-title{display:none;}
  body.printing-admin .admin-row{display:none;}
  body.printing-admin .admin-row.print-target{display:block !important; border:none; padding:0;}
  body.printing-admin .admin-row.print-target .detail-panel{display:block !important;}
  body.printing-admin .admin-row-top{cursor:default;}
  body.printing-admin .date-select-row select{border:none; background:none; font-weight:700;}
  body.printing-admin .mini-chart-block{break-inside:avoid;}
  body.printing-admin .detail-item{break-inside:avoid;}
}
</style>
</head>

<div id="app"></div>

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, duration){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>t.classList.remove('show'), duration || 1800);
}

/* ---------- storage helpers (Firestore) ---------- */
function docIdFor(resident, date){
  // Firestore 문서 ID는 '/'를 포함할 수 없어 언더스코어로 구분
  return `${resident}_${date}`;
}
async function getRecord(resident, date){
  try{
    const ref = doc(db, 'records', docIdFor(resident, date));
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data() : null;
  }catch(e){
    console.error('getRecord error:', e);
    return null;
  }
}
async function saveRecord(resident, date, data){
  try{
    const ref = doc(db, 'records', docIdFor(resident, date));
    await setDoc(ref, data);
    return {ok:true};
  }catch(e){
    console.error('saveRecord error:', e);
    return {ok:false, error:(e && e.message) ? e.message : String(e)};
  }
}
async function getLatestRecord(resident){
  try{
    const q = query(collection(db, 'records'), where('resident', '==', resident));
    const snaps = await getDocs(q);
    if(snaps.empty) return null;
    let latest = null;
    snaps.forEach(d=>{
      const data = d.data();
      if(!latest || data.date > latest.date) latest = data;
    });
    return latest ? {date: latest.date, data: latest} : null;
  }catch(e){
    console.error('getLatestRecord error:', e);
    return null;
  }
}
async function getAllRecords(){
  try{
    const snaps = await getDocs(collection(db, 'records'));
    const arr = [];
    snaps.forEach(d=>arr.push(d.data()));
    return arr;
  }catch(e){
    console.error('getAllRecords error:', e);
    return [];
  }
}

function renderFieldBlock(def){
  if(def.type === 'bristol'){
    const opts = ['1','2','3','4','5','6','7','해당없음'];
    const val = currentForm.bristol;
    return `
      <div class="field-block">
        <div class="field-label">${esc(def.label)}</div>
        <div class="field-caption">${BRISTOL_CAPTION}</div>
        <div class="pill-group" data-field="bristol">
          ${opts.map(o=>`<button type="button" class="pill bristol ${val===o?'selected':''}" data-value="${esc(o)}">${esc(o)}</button>`).join('')}
        </div>
      </div>
    `;
  }
  const val = currentForm[def.key];
  const otherVal = currentForm[def.key+'Other'] || '';
  const isSelected = (o) => def.multi ? (Array.isArray(val) && val.includes(o)) : (val === o);
  return `
    <div class="field-block">
      <div class="field-label">${esc(def.label)} ${def.required?'<span class="req">필수</span>':''}</div>
      ${def.multi ? `<div class="field-caption">여러 개 선택 가능 (예: 오전+오후 모두 배변한 경우)</div>` : ''}
      <div class="pill-group" data-field="${def.key}">
        ${def.options.map(o=>{
          const warn = def.warnValue && def.warnValue===o ? 'warn' : '';
          return `<button type="button" class="pill ${warn} ${isSelected(o)?'selected':''}" data-value="${esc(o)}">${esc(o)}</button>`;
        }).join('')}
      </div>
      ${def.allowOther ? `<input type="text" class="other-input ${val==='기타'?'show':''}" id="other-${def.key}" placeholder="기타 내용을 입력하세요" value="${esc(otherVal)}">` : ''}
    </div>
  `;
}

function updateProgress(){
  const filled = FIELD_DEFS.filter(d=>{
    const v = currentForm[d.key];
    if(d.multi) return Array.isArray(v) && v.length > 0;
    return v !== undefined && v !== null && v !== '';
  }).length;
  const total = FIELD_DEFS.length;
  const pct = Math.round((filled/total)*100);
  const note = document.getElementById('progressNote');
  const fill = document.getElementById('progressFill');
  if(note) note.textContent = `${total}개 항목 중 ${filled}개 입력됨`;
  if(fill) fill.style.width = pct + '%';
}

  {key:'bowelAmount', label:'배변 양', max:3, yTop:'많음', yBottom:'없음',

  {key:'vomiting', label:'구토 발생', max:1, yTop:'있음', yBottom:'없음', warnHigh:1,
    valueFn:v=>({'있음':1,'없음':0})[v] ?? null},
  {key:'probiotics', label:'유산균 복용', max:1, yTop:'복용', yBottom:'미복용/거부',
    valueFn:v=>({'복용':1,'미복용':0,'거부':0,'보류':0})[v] ?? null},

];

function filterByRange(records, days){
  if(days >= 999999) return records;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - (days - 1));
  const cutoffStr = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
  return records.filter(r => r.date >= cutoffStr);
}

function buildSeries(recordsAscending, chartDef){
  return recordsAscending.map(r => ({date: r.date, value: chartDef.valueFn(r[chartDef.key])}));
}

function renderLineChartSVG(points, def){
  const valid = points.filter(p=>p.value !== null);
  if(valid.length === 0){
    return `<div class="no-record" style="padding:6px 0 12px;">데이터 없음</div>`;
  }
  const W = 300, H = 78, padL = 30, padR = 8, padT = 8, padB = 16;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = points.length;
  const xForIndex = i => padL + (n <= 1 ? plotW/2 : (i/(n-1)) * plotW);
  const yForValue = v => padT + plotH - ((v/def.max) * plotH);

  let segments = [];
  let current = [];
  points.forEach((p,i)=>{
    if(p.value === null){
      if(current.length) segments.push(current);
      current = [];
    }else{
      current.push({x:xForIndex(i), y:yForValue(p.value)});
    }
  });
  if(current.length) segments.push(current);

  const pathsHtml = segments.map(seg=>{
    const d = seg.map((pt,i)=> (i===0?'M':'L') + pt.x.toFixed(1) + ' ' + pt.y.toFixed(1)).join(' ');
    return `<path d="${d}" fill="none" stroke="#3E5C76" stroke-width="2"/>`;
  }).join('');

  const dotsHtml = points.map((p,i)=>{
    if(p.value === null) return '';
    const isWarn = def.warnHigh !== undefined && p.value >= def.warnHigh;
    return `<circle cx="${xForIndex(i).toFixed(1)}" cy="${yForValue(p.value).toFixed(1)}" r="2.8" fill="${isWarn?'#C85A3E':'#3E5C76'}"/>`;
  }).join('');

  const gridHtml = [0,0.5,1].map(f=>{
    const y = padT + plotH * (1-f);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#DCE2E8" stroke-width="1"/>`;
  }).join('');

  const firstLabel = points[0].date.slice(5);
  const lastLabel = points[points.length-1].date.slice(5);

  return `
    <svg viewBox="0 0 ${W} ${H}" class="line-chart-svg">
      ${gridHtml}
      <text x="1" y="${padT+5}" font-size="7.5" fill="#5B6B7C">${esc(def.yTop)}</text>
      <text x="1" y="${H-padB+3}" font-size="7.5" fill="#5B6B7C">${esc(def.yBottom)}</text>
      ${pathsHtml}
      ${dotsHtml}
      <text x="${padL}" y="${H-2}" font-size="7.5" fill="#5B6B7C">${esc(firstLabel)}</text>
      <text x="${W-padR}" y="${H-2}" font-size="7.5" fill="#5B6B7C" text-anchor="end">${esc(lastLabel)}</text>
    </svg>
  `;
}

function renderResidentCharts(filtered){
  if(filtered.length === 0){
    return `<div class="no-record" style="padding:10px 0;">선택한 기간에 입력된 기록이 없습니다</div>`;
  }
  return `

      const points = buildSeries(filtered, cd);

/* 하루치 기록의 "쾌변 지수"(0~1) — 배변여부/브리스톨(3~5 정상)/복부팽만/통증/구토 중
   기록된 항목 대비 양호한 항목의 비율. 참고용 지표이며 진단이 아님 */
function dailyWellnessScore(r){
  let count = 0, good = 0;
  if(r.bowel){ count++; if(r.bowel==='있음') good++; }
  if(r.bristol && r.bristol !== '해당없음'){
    count++;
    const b = parseInt(r.bristol, 10);
    if(!isNaN(b) && b>=3 && b<=5) good++;
  }
  if(r.abdominalBloating){ count++; if(r.abdominalBloating==='없음') good++; }
  if(r.painExpression){ count++; if(r.painExpression==='없음') good++; }
  if(r.vomiting){ count++; if(r.vomiting==='없음') good++; }
  return count > 0 ? good/count : null;
}

function computeResidentMetrics(records){
  const total = records.length;
  if(total === 0) return null;
  let bowelYes=0, bloatingYes=0, painYes=0, vomitYes=0;
  let bristolVals=[], bowelCounts=[];
  let probioticsTotal=0, probioticsTaken=0;

  records.forEach(r=>{
    if(r.bowel==='있음') bowelYes++;
    if(r.bowel==='없음') {} // no-op, counted via total
    if(r.abdominalBloating==='있음') bloatingYes++;
    if(r.painExpression==='있음') painYes++;
    if(r.vomiting==='있음') vomitYes++;
    if(r.bristol && r.bristol!=='해당없음'){
      const b = parseInt(r.bristol,10);
      if(!isNaN(b)) bristolVals.push(b);
    }
    if(r.bowelCount){
      const m = /^(\d+)회$/.exec(r.bowelCount);
      if(m) bowelCounts.push(parseInt(m[1],10));
    }
    if(r.probiotics){
      probioticsTotal++;
      if(r.probiotics==='복용') probioticsTaken++;
    }
  });

  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

  return {
    total,
    bowelRate: Math.round((bowelYes/total)*100),
    bloatingRate: Math.round((bloatingYes/total)*100),
    painRate: Math.round((painYes/total)*100),
    vomitRate: Math.round((vomitYes/total)*100),
    avgBristol: avg(bristolVals),
    avgBowelCount: avg(bowelCounts),
    probioticsRate: probioticsTotal ? Math.round((probioticsTaken/probioticsTotal)*100) : null,
    avgWellness: avg(records.map(dailyWellnessScore).filter(v=>v!==null)),
  };
}

function generateResidentInsights(filtered){
  if(filtered.length === 0) return [];
  const m = computeResidentMetrics(filtered);
  const insights = [];

  // 1. 배변 빈도
  if(m.bowelRate >= 85){
    insights.push({level:'good', text:`선택 기간 중 배변이 있었던 날이 ${m.bowelRate}%로, 배변 빈도는 양호한 편입니다.`});
  }else if(m.bowelRate < 50){
    insights.push({level:'warn', text:`선택 기간 중 배변이 있었던 날이 ${m.bowelRate}%에 그쳐, 배변 빈도가 낮은 편입니다.`});
  }else{
    insights.push({level:'neutral', text:`선택 기간 중 배변이 있었던 날은 ${m.bowelRate}%입니다.`});
  }

  // 2. 변 상태 (브리스톨)
  if(m.avgBristol !== null){
    const avgB = m.avgBristol.toFixed(1);
    if(m.avgBristol >= 3 && m.avgBristol <= 5){
      insights.push({level:'good', text:`브리스톨 평균이 ${avgB}단계로 정상 범위(3~5단계)에 속해 쾌변 경향을 보입니다.`});
    }else if(m.avgBristol < 3){
      insights.push({level:'warn', text:`브리스톨 평균이 ${avgB}단계로 낮아, 단단한 변(변비 경향)이 자주 관찰됩니다.`});
    }else{
      insights.push({level:'warn', text:`브리스톨 평균이 ${avgB}단계로 높아, 무른 변 · 설사 경향이 관찰됩니다.`});
    }
  }

  // 3. 복부팽만 + 브리스톨 결합 해석 (배변은 있으나 쾌변이 아닌 패턴 포착)
  if(m.bloatingRate >= 30 && m.avgBristol !== null && m.avgBristol < 3.5 && m.bowelRate >= 70){
    insights.push({level:'warn', text:`배변은 대체로 매일 있으나(${m.bowelRate}%), 브리스톨 단계가 낮고 복부팽만이 ${m.bloatingRate}%의 날에서 함께 관찰되어 쾌변이 원활하지 않을 가능성이 있습니다.`});
  }else if(m.bloatingRate >= 30){
    insights.push({level:'warn', text:`복부팽만이 ${m.bloatingRate}%의 날에서 관찰되어 주의가 필요합니다.`});
  }

  // 4. 통증 · 구토
  if(m.painRate > 0 || m.vomitRate > 0){
    insights.push({level:'warn', text:`통증 표현 ${m.painRate}%, 구토 ${m.vomitRate}%의 날에서 있었습니다. 반복되면 진료 연계를 검토해보세요.`});
  }else{
    insights.push({level:'good', text:`통증 · 구토 등 이상징후는 관찰되지 않았습니다.`});
  }

  // 5. 유산균 복용 + 추세(쾌변 지수 전반부 vs 후반부)
  if(filtered.length >= 4){
    const half = Math.floor(filtered.length/2);
    const firstHalf = computeResidentMetrics(filtered.slice(0, half));
    const secondHalf = computeResidentMetrics(filtered.slice(filtered.length-half));
    if(firstHalf && secondHalf && firstHalf.avgWellness !== null && secondHalf.avgWellness !== null){
      const diff = secondHalf.avgWellness - firstHalf.avgWellness;
      const probioticsNote = m.probioticsRate !== null ? ` (유산균 복용률 ${m.probioticsRate}%)` : '';
      if(diff >= 0.15){
        insights.push({level:'good', text:`선택 기간 초반 대비 후반의 배변 관련 지표가 개선되어, 증상이 완화되는 추세입니다${probioticsNote}.`});
      }else if(diff <= -0.15){
        insights.push({level:'warn', text:`선택 기간 초반 대비 후반의 배변 관련 지표가 다소 저하되어, 증상이 악화되는 추세입니다${probioticsNote}. 관리 항목 이행 상태를 점검해보세요.`});
      }else if(m.probioticsRate !== null){
        insights.push({level:'neutral', text:`유산균 복용률은 ${m.probioticsRate}%이며, 선택 기간 내 뚜렷한 변화 추세는 보이지 않습니다.`});
      }
    }
  }else if(m.probioticsRate !== null){
    insights.push({level:'neutral', text:`유산균 복용률은 ${m.probioticsRate}%입니다. 추세 비교는 기록이 4건 이상일 때 제공됩니다.`});
  }

  return insights;
}

    ${FIELD_DEFS.map(def=>{
      let v = rec[def.key];
      if(Array.isArray(v)) v = v.join(', ');
      if(def.key==='snack' && v==='기타' && rec.snackOther) v = `기타(${rec.snackOther})`;
      return `<div class="detail-item"><span class="k">${esc(def.label)}</span><span class="v">${v?esc(v):'-'}</span></div>`;
    }).join('')}
    ${rec.note ? `<div class="detail-item"><span class="k">메모</span><span class="v">${esc(rec.note)}</span></div>` : ''}
  `;
}

function topbarHtml(label, action){
  return `
    <div class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="#3E5C76" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="4" width="14" height="17" rx="1.5"/>
          <rect x="9" y="2.5" width="6" height="3" rx="1"/>
          <path d="M8.5 12.5l2.2 2.2L15.5 10"/>
        </svg>
        <div>
          <span class="brand-eyebrow">건강지원팀 · 배변관리기록</span>
          <span class="brand-name">사하의집</span>
        </div>
      </div>
      <button class="back-btn" data-action="${action}">‹ ${esc(label)}</button>
    </div>
  `;
}

/* ---------- event delegation ---------- */
document.getElementById('app').addEventListener('click', async (e)=>{
  const actionEl = e.target.closest('[data-action]');
  if(actionEl){
    const action = actionEl.dataset.action;
    if(action === 'go-home') return renderHome();
    if(action === 'go-list') return renderList();
    if(action === 'go-admin') return checkAdminAccess();
    if(action === 'submit-admin-password') return submitAdminPassword();
    if(action === 'open-resident'){
      return renderChecklist(actionEl.dataset.resident, todayStr());
    }
    if(action === 'toggle-detail'){
      const panel = document.getElementById(`detail-${actionEl.dataset.resident}`);
      if(panel) panel.classList.toggle('show');
      return;
    }
    if(action === 'set-range'){
      adminStatRangeDays = parseInt(actionEl.dataset.days, 10);
      document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
      actionEl.classList.add('active');
      const container = document.getElementById('residentRowsContainer');
      if(container){
        const openNames = Array.from(container.querySelectorAll('.detail-panel.show'))
          .map(el => el.id.replace('detail-', ''));
        container.innerHTML = RESIDENTS.map(name=>renderAdminRow(name, adminByResident[name])).join('');
        openNames.forEach(n=>{
          const panel = document.getElementById(`detail-${n}`);
          if(panel) panel.classList.add('show');
        });
      }
      return;
    }
    if(action === 'print-checklist'){
      const header = document.getElementById('printHeader');
      if(header) header.textContent = `사하의집 · 배변 관리 체크리스트 — ${currentResident} (${currentDate})`;
      document.body.classList.add('printing-checklist');
      window.print();
      return;
    }
    if(action === 'print-admin-row'){
      const resident = actionEl.dataset.resident;
      const row = actionEl.closest('.admin-row');
      document.querySelectorAll('.admin-row').forEach(r=>r.classList.remove('print-target'));
      if(row){
        row.classList.add('print-target');
        const header = row.querySelector('.print-header');
        if(header) header.textContent = `사하의집 · ${resident} 변비 관리 기록 (조회일: ${todayStr()})`;
      }
      document.body.classList.add('printing-admin');
      window.print();
      return;
    }
    if(action === 'save-checklist'){
      if(!currentForm.bowel){
        showToast('배변 여부는 필수 입력입니다');
        return;
      }
      const noteEl = document.getElementById('noteInput');
      currentForm.note = noteEl ? noteEl.value.trim() : '';
      currentForm.resident = currentResident;
      currentForm.date = currentDate;
      currentForm.savedAt = new Date().toISOString();
      actionEl.disabled = true;
      actionEl.textContent = '저장 중…';
      const result = await saveRecord(currentResident, currentDate, currentForm);
      if(result.ok){
        showToast('저장되었습니다');
        renderList();
      }else{
        showToast('저장 실패: ' + result.error, 5000);
        actionEl.disabled = false;
        actionEl.textContent = '체크리스트 저장';
      }
      return;
    }
  }

  /* pill selection */
  const pill = e.target.closest('.pill');
  if(pill){
    const group = pill.closest('[data-field]');
    if(!group) return;
    const field = group.dataset.field;
    const value = pill.dataset.value;
    const def = FIELD_DEFS.find(d=>d.key===field);

    if(def && def.multi){
      let arr = Array.isArray(currentForm[field]) ? [...currentForm[field]] : [];
      if(value === '해당없음'){
        arr = arr.includes('해당없음') ? [] : ['해당없음'];
      }else{
        arr = arr.filter(v=>v!=='해당없음');
        if(arr.includes(value)){
          arr = arr.filter(v=>v!==value);
        }else{
          arr.push(value);
        }
      }
      currentForm[field] = arr;
      group.querySelectorAll('.pill').forEach(p=>{
        p.classList.toggle('selected', arr.includes(p.dataset.value));
      });
    }else{
      currentForm[field] = value;
      group.querySelectorAll('.pill').forEach(p=>p.classList.remove('selected'));
      pill.classList.add('selected');
    }

    if(field === 'snack'){
      const otherInput = document.getElementById('other-snack');
      if(otherInput) otherInput.classList.toggle('show', value === '기타');
    }
    updateProgress();
  }
});

document.getElementById('app').addEventListener('input', (e)=>{
  if(e.target.id === 'other-snack'){
    currentForm.snackOther = e.target.value;
  }
});

document.getElementById('app').addEventListener('change', (e)=>{
  if(e.target.classList.contains('date-select')){
    const resident = e.target.dataset.resident;
    const selectedDate = e.target.value;
    const rec = adminAllRecords.find(r=>r.resident===resident && r.date===selectedDate);
    const container = document.getElementById(`detailFields-${resident}`);
    if(container) container.innerHTML = renderDetailFields(rec);
  }
});

window.addEventListener('afterprint', ()=>{
  document.body.classList.remove('printing-checklist', 'printing-admin');
  document.querySelectorAll('.admin-row.print-target').forEach(r=>r.classList.remove('print-target'));
});

/* init */
renderHome();
</script>
