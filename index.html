<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>의사소통-아파요</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E63946; --red-light: #fdecea; --red-dark: #b02030;
    --bg: #F5F0EB; --card: #ffffff; --text: #1a1a1a; --muted: #888;
  }
  html, body {
    height: 100%; background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif; color: var(--text);
    overflow-x: hidden;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 1.2rem 1rem 2.5rem;
  }
  header { text-align: center; margin-bottom: 1rem; }
  header h1 { font-size: clamp(20px, 5vw, 28px); font-weight: 900; letter-spacing: -0.5px; }
  header p { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .guide-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--red-light); color: var(--red-dark);
    font-size: 13px; font-weight: 700; padding: 6px 14px;
    border-radius: 100px; margin-top: 8px;
    animation: pulse-chip 2s ease-in-out infinite;
  }
  @keyframes pulse-chip { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

  .body-wrap { position: relative; width: min(240px, 68vw); flex-shrink: 0; }
  .body-wrap svg { width: 100%; height: auto; display: block; }

  .hz {
    position: absolute;
    border-radius: 50%;
    border: 2.5px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    cursor: pointer;
    user-select: none;
  }
  .hz.active {
    background: rgba(230,57,70,0.28) !important;
    border-color: var(--red);
  }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.38); z-index: 100;
    justify-content: center; align-items: center; padding: 2rem;
  }
  .overlay.show { display: flex; }

  .pain-card {
    background: var(--card); border-radius: 24px;
    padding: 2rem 1.8rem 1.8rem; text-align: center;
    max-width: 300px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.22);
    animation: pop-in 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop-in { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

  .pain-face { font-size: 70px; line-height: 1; margin-bottom: 0.7rem; }
  .pain-text { font-size: clamp(22px,6vw,30px); font-weight: 900; color: var(--red); margin-bottom: 0.3rem; }
  .pain-sub { font-size: 15px; color: var(--muted); margin-bottom: 1.6rem; }

  .sound-wave {
    display: flex; align-items: center; justify-content: center;
    gap: 5px; height: 32px; margin-bottom: 1.4rem;
  }
  .wave-bar {
    width: 6px; background: var(--red); border-radius: 3px;
    animation: wave 0.7s ease-in-out infinite;
  }
  .wave-bar:nth-child(1){ height:12px; animation-delay:0s; }
  .wave-bar:nth-child(2){ height:24px; animation-delay:0.1s; }
  .wave-bar:nth-child(3){ height:32px; animation-delay:0.2s; }
  .wave-bar:nth-child(4){ height:24px; animation-delay:0.1s; }
  .wave-bar:nth-child(5){ height:12px; animation-delay:0s; }
  @keyframes wave {
    0%,100%{ transform: scaleY(0.4); opacity:0.5; }
    50%{ transform: scaleY(1); opacity:1; }
  }

  .close-btn {
    width: 100%; padding: 14px;
    background: #f0f0f0; color: #555;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  footer { margin-top: 1.2rem; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.8; }
</style>
</head>

<div class="overlay" id="overlay">
  <div class="pain-card" id="painCard">
    <div class="pain-face" id="painFace">😣</div>
    <div class="pain-text" id="painText">머리가 아파요!</div>
    <div class="pain-sub">선생님께 보여주세요</div>
    <div class="sound-wave">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>

      <div class="wave-bar"></div>

    <button class="close-btn" id="closeBtn">확인 ✓</button>
  </div>

<footer>
  지적장애인 의사소통 보조 도구<br>
  아픈 곳을 누르면 소리로 알려줘요
</footer>

<script>
// 목소리 미리 로드
var voices = [];
function loadVoices() {
  voices = window.speechSynthesis.getVoices();
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.82;
  u.pitch = 1.05;
  u.volume = 1;
  var koVoice = voices.find(function(v){ return v.lang.startsWith('ko'); });
  if (koVoice) u.voice = koVoice;
  window.speechSynthesis.speak(u);
}

// 신체 부위: 손가락 닿는 순간 팝업 + 소리 동시에
document.querySelectorAll('.hz').forEach(function(el) {
  function trigger(e) {
    e.preventDefault();
    el.classList.add('active');
    setTimeout(function(){ el.classList.remove('active'); }, 300);

    var part = el.getAttribute('data-part');
    document.getElementById('painFace').textContent = el.getAttribute('data-face') || '😣';
    document.getElementById('painText').textContent = part + '이(가) 아파요!';
    document.getElementById('overlay').classList.add('show');

    speak(part + '이 아파요. 선생님 도와주세요.');
  }
  el.addEventListener('touchstart', trigger, { passive: false });
  el.addEventListener('mousedown', trigger);
});

// 닫기
var closeBtn = document.getElementById('closeBtn');
function doClose(e) {
  e.preventDefault();
  document.getElementById('overlay').classList.remove('show');
  window.speechSynthesis && window.speechSynthesis.cancel();
}
closeBtn.addEventListener('touchstart', doClose, { passive: false });
closeBtn.addEventListener('mousedown', doClose);

document.getElementById('overlay').addEventListener('touchstart', function(e){
  if (e.target === this) doClose(e);
}, { passive: false });
document.getElementById('overlay').addEventListener('mousedown', function(e){
  if (e.target === this) doClose(e);
});

document.addEventListener('keydown', function(e){ if(e.key==='Escape') doClose(e); });
</script>
